<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSpark LLC - Reservas</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #345e3d; --light: #e9f5ec; --white: #ffffff; }
        body { font-family: sans-serif; margin: 0; background: var(--white); color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px; background: var(--light); border-bottom: 4px solid var(--primary); border-radius: 0 0 20px 20px; }
        .card { background: var(--light); padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-top: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .btn-reserve { background: var(--primary); color: white; }
        .btn-admin { background: none; border: 1px solid var(--primary); color: var(--primary); width: auto; padding: 5px 15px; font-size: 0.8rem; }
        
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.8rem; }
        th { background: var(--primary); color: white; }

        .grid-horas { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .hora-item { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .toggle { cursor: pointer; padding: 5px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .disponible { background: #d4edda; color: #155724; }
        .bloqueado { background: #f8d7da; color: #721c24; }
        
        #loginSection, #adminSection { display: none; }
    </style>
</head>
<body>

    <div class="container" style="text-align: right;">
        <button class="btn-admin" id="btnIrLogin" onclick="verLogin()">Admin</button>
    </div>

    <header>
        <h1 style="color: var(--primary);">ECOSPARK LLC</h1>
        <p>Servicios de Limpieza Profesional</p>
    </header>

    <div class="container">
        <!-- VISTA CLIENTE -->
        <section id="clientSection">
            <div class="card">
                <h2>Reserva tu Cita</h2>
                <label>Nombre</label>
                <input type="text" id="nombreCliente" placeholder="Tu nombre">
                <label>Telefono</label>
                <input type="tel" id="telCliente" placeholder="787-000-0000">
                <label>Fecha</label>
                <input type="date" id="fechaCliente" onchange="cargarHorasCliente()">
                <label>Horas Disponibles</label>
                <select id="horaCliente"><option value="">Seleccione fecha...</option></select>
                <label>Servicio</label>
                <select id="servicioCliente">
                    <option>Limpieza Basica</option>
                    <option>Limpieza Profunda</option>
                    <option>Limpieza de Oficinas</option>
                    <option>Limpieza Comercial</option>
                    <option>Limpieza de Airbnb's</option>
                </select>
                <button class="btn btn-reserve" onclick="finalizarReserva()">RESERVA YA</button>
            </div>
        </section>

        <!-- LOGIN -->
        <section id="loginSection" class="card">
            <h2>Acceso Admin</h2>
            <input type="text" id="userAdmin" placeholder="Usuario">
            <input type="password" id="passAdmin" placeholder="Password">
            <button class="btn btn-reserve" onclick="entrarAlPanel()">Entrar</button>
            <button class="btn" style="background:#ccc;" onclick="location.reload()">Volver</button>
        </section>

        <!-- PANEL ADMIN -->
        <section id="adminSection">
            <div class="card">
                <h2>Citas Recibidas</h2>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr><th>Nombre</th><th>Tel.</th><th>Fecha/Hora</th><th>Servicio</th></tr>
                        </thead>
                        <tbody id="tablaCitas"></tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <h2>Gestionar Horas</h2>
                <input type="date" id="fechaAdmin" onchange="cargarHorasAdmin()">
                <div class="grid-horas" id="adminGrid" style="display:none;">
                    <div class="hora-item">9:00 AM <span id="h-9" class="toggle disponible" onclick="cambiarHora('9')">DISPONIBLE</span></div>
                    <div class="hora-item">10:00 AM <span id="h-10" class="toggle disponible" onclick="cambiarHora('10')">DISPONIBLE</span></div>
                    <div class="hora-item">11:00 AM <span id="h-11" class="toggle disponible" onclick="cambiarHora('11')">DISPONIBLE</span></div>
                    <div class="hora-item">12:00 PM <span id="h-12" class="toggle disponible" onclick="cambiarHora('12')">DISPONIBLE</span></div>
                </div>
            </div>
            <button class="btn" style="background:#666; color:white;" onclick="location.reload()">Cerrar Sesion</button>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBCsC16XwRHOO76eS4-BqhA0Y-8IH83maA",
            authDomain: "ecosparkllc.firebaseapp.com",
            projectId: "ecosparkllc",
            storageBucket: "ecosparkllc.firebasestorage.app",
            messagingSenderId: "403323212209",
            appId: "1:403323212209:web:cf3a4adf96226a09d4ed90"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // NAVEGACION
        function verLogin() {
            document.getElementById('clientSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
        }

        function entrarAlPanel() {
            const u = document.getElementById('userAdmin').value;
            const p = document.getElementById('passAdmin').value;
            if(u === "kamalishsantos" && p === "Kamalish22_") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
                document.getElementById('btnIrLogin').style.display = 'none';
                mostrarCitasRecibidas();[cite: 1]
            } else { alert("Error"); }
        }

        // CLIENTE
        function cargarHorasCliente() {
            const f = document.getElementById('fechaCliente').value;
            if(!f) return;
            db.ref('bloqueos/' + f).on('value', snap => {[cite: 1]
                const b = snap.val() || {};
                const s = document.getElementById('horaCliente');
                s.innerHTML = "";
                let c = 0;
                ["9", "10", "11", "12"].forEach(h => {
                    if(!b[h]) {
                        const t = h === "12" ? "12:00 PM" : h + ":00 AM";
                        s.options.add(new Option(t, h));
                        c++;
                    }
                });
                if(c === 0) s.options.add(new Option("Sin disponibilidad", ""));
            });
        }

        function finalizarReserva() {
            const n = document.getElementById('nombreCliente').value;[cite: 1]
            const t = document.getElementById('telCliente').value;[cite: 1]
            const f = document.getElementById('fechaCliente').value;[cite: 1]
            const h = document.getElementById('horaCliente').value;[cite: 1]
            const s = document.getElementById('servicioCliente').value;[cite: 1]

            if(!n || !t || !f || !h || h === "") { alert("Llene todo"); return; }

            db.ref('datosReservas').push({ nombre: n, tel: t, fecha: f, hora: h, servicio: s });[cite: 1]
            db.ref('bloqueos/' + f + '/' + h).set(true).then(() => {[cite: 1]
                alert("Confirmado");
                location.reload();
            });
        }

        // ADMIN
        function mostrarCitasRecibidas() {[cite: 1]
            db.ref('datosReservas').on('value', snap => {[cite: 1]
                const b = document.getElementById('tablaCitas');[cite: 1]
                b.innerHTML = "";[cite: 1]
                snap.forEach(h => {[cite: 1]
                    const d = h.val();[cite: 1]
                    b.innerHTML += `<tr><td>${d.nombre}</td><td>${d.tel}</td><td>${d.fecha} (${d.hora}:00)</td><td>${d.servicio}</td></tr>`;[cite: 1]
                });
            });
        }

        function cargarHorasAdmin() {
            const f = document.getElementById('fechaAdmin').value;
            if(!f) return;
            document.getElementById('adminGrid').style.display = 'grid';
            db.ref('bloqueos/' + f).on('value', snap => {[cite: 1]
                const b = snap.val() || {};
                ["9", "10", "11", "12"].forEach(h => {
                    const e = document.getElementById('h-' + h);
                    const estaB = b[h];
                    e.innerText = estaB ? "BLOQUEADO" : "DISPONIBLE";
                    e.className = estaB ? "toggle bloqueado" : "toggle disponible";
                });
            });
        }

        function cambiarHora(h) {
            const f = document.getElementById('fechaAdmin').value;
            if(!f) return;
            const ref = db.ref('bloqueos/' + f + '/' + h);[cite: 1]
            ref.once('value', snap => {[cite: 1]
                if(snap.exists()) ref.remove(); else ref.set(true);[cite: 1]
            });
        }
    </script>
</body>
</html>
