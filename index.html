<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSpark LLC - Reserva Garantizada</title>
    <style>
        :root { --primary: #345e3d; --light: #e9f5ec; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--white); color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px; background: var(--light); border-radius: 0 0 40px 40px; border-bottom: 5px solid var(--primary); }
        .card { background: var(--light); padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 20px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-reserve { background: var(--primary); color: white; }
        .time-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .time-item { background: white; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .status-toggle { cursor: pointer; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .on { background: #d4edda; color: #155724; }
        .off { background: #f8d7da; color: #721c24; }
        #adminPanel, #loginForm { display: none; }
    </style>
</head>
<body>

    <div class="container" style="text-align: right;">
        <button onclick="showLogin()" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:5px 10px; border-radius:15px; cursor:pointer;">Admin</button>
    </div>

    <header>
        <h1 style="color: var(--primary); margin:0;">ECOSPARK LLC</h1>
        <p>Servicios de Limpieza | San Juan, PR</p>
    </header>

    <div class="container">
        <section id="clientView">
            <div class="card">
                <h2>Reserva tu Espacio</h2>
                <label>Fecha</label>
                <input type="date" id="cDate" onchange="actualizarHorasDisponibles()">
                <label>Horarios Disponibles</label>
                <select id="cTime">
                    <option>Seleccione una fecha...</option>
                </select>
                <button class="btn btn-reserve" onclick="alert('Solicitud enviada')">¡RESERVA YA!</button>
            </div>
        </section>

        <section id="loginForm" class="card">
            <h2>Acceso Admin</h2>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn btn-reserve" onclick="checkLogin()">Entrar</button>
        </section>

        <section id="adminPanel" class="card">
            <h2>Gestión de Horarios</h2>
            <input type="date" id="adminDate" onchange="cargarHorasAdmin()">
            <div class="time-grid" id="adminTimeSettings" style="display:none; margin-top:20px;">
                <div class="time-item">9:00 AM <span id="s-9" class="status-toggle on" onclick="toggleTime('9')">DISPONIBLE</span></div>
                <div class="time-item">10:00 AM <span id="s-10" class="status-toggle on" onclick="toggleTime('10')">DISPONIBLE</span></div>
                <div class="time-item">11:00 AM <span id="s-11" class="status-toggle on" onclick="toggleTime('11')">DISPONIBLE</span></div>
                <div class="time-item">12:00 PM <span id="s-12" class="status-toggle on" onclick="toggleTime('12')">DISPONIBLE</span></div>
            </div>
            <button class="btn" style="background:#666; color:white; margin-top:30px;" onclick="location.reload()">Cerrar Sesión</button>
        </section>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsAcfd1bZLhQN_bQ4f9elYFEz6BgRq-jg7oP7P2NHOTby_qSkZnQMebINEng99UTtM8g/exec";
        let bloqueos = [];

        async function fetchBD() {
            try {
                const r = await fetch(SCRIPT_URL + "?nocache=" + new Date().getTime());
                bloqueos = await r.json();
            } catch (e) { console.error(e); }
        }

        function showLogin() {
            document.getElementById('clientView').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        function checkLogin() {
            if(document.getElementById('user').value === "kamalishsantos" && document.getElementById('pass').value === "Kamalish22_") {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } else { alert("Error"); }
        }

        // --- LÓGICA COMPARTIDA ---
        function estaBloqueado(fecha, hora) {
            // Limpieza de datos para asegurar comparación exacta
            return bloqueos.some(row => {
                const fRow = String(row[1]).trim();
                const hRow = String(row[2]).trim();
                return fRow === String(fecha).trim() && hRow === String(hora).trim();
            });
        }

        async function cargarHorasAdmin() {
            const fecha = document.getElementById('adminDate').value;
            if(!fecha) return;
            document.getElementById('adminTimeSettings').style.display = 'grid';
            await fetchBD();
            
            ["9", "10", "11", "12"].forEach(h => {
                const btn = document.getElementById('s-' + h);
                if(estaBloqueado(fecha, h)) {
                    btn.innerText = "BLOQUEADO";
                    btn.className = "status-toggle off";
                } else {
                    btn.innerText = "DISPONIBLE";
                    btn.className = "status-toggle on";
                }
            });
        }

        async function toggleTime(hora) {
            const fecha = document.getElementById('adminDate').value;
            const btn = document.getElementById('s-' + hora);
            const esBloqueo = btn.innerText === "BLOQUEADO";

            // UI inmediata
            btn.innerText = esBloqueo ? "DISPONIBLE" : "BLOQUEADO";
            btn.className = esBloqueo ? "status-toggle on" : "status-toggle off";

            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "bloquear", fecha: fecha, hora: hora })
            });

            // Actualizar lista local después de un momento
            setTimeout(fetchBD, 1500);
        }

        async function actualizarHorasDisponibles() {
            const fecha = document.getElementById('cDate').value;
            const select = document.getElementById('cTime');
            if(!fecha) return;

            select.innerHTML = "<option>Cargando...</option>";
            await fetchBD();
            select.innerHTML = "";

            let opciones = 0;
            ["9", "10", "11", "12"].forEach(h => {
                if(!estaBloqueado(fecha, h)) {
                    let label = h === "12" ? "12:00 PM" : h.padStart(2, '0') + ":00 AM";
                    select.options.add(new Option(label, label));
                    opciones++;
                }
            });

            if(opciones === 0) select.options.add(new Option("Sin disponibilidad", ""));
        }

        window.onload = fetchBD;
    </script>
</body>
</html>
