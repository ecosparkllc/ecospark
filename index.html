<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSpark LLC - Reservas</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #345e3d; --light: #e9f5ec; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--white); color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px; background: var(--light); border-radius: 0 0 40px 40px; border-bottom: 5px solid var(--primary); }
        h1 { color: var(--primary); margin: 0; text-transform: uppercase; }
        .card { background: var(--light); padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 20px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-reserve { background: var(--primary); color: white; }
        .btn-home { background: white; color: var(--primary); border: 2px solid var(--primary); margin-top: 10px; }
        
        .table-wrap { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        th { background: var(--primary); color: white; }

        .time-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        .time-item { background: white; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .status-toggle { cursor: pointer; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .on { background: #d4edda; color: #155724; }
        .off { background: #f8d7da; color: #721c24; }
        
        #adminPanel, #loginForm { display: none; }
        footer { text-align: center; padding: 30px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div class="container" style="text-align: right;">
        <button id="navAdmin" onclick="mostrarLogin()" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:5px 15px; border-radius:20px; cursor:pointer; font-weight:bold;">Admin</button>
    </div>

    <header>
        <h1>ECOSPARK LLC</h1>
        <p>Servicios de Limpieza | San Juan, PR</p>
    </header>

    <div class="container">
        <!-- VISTA CLIENTE -->
        <section id="clientView">
            <div class="card">
                <h2>Reserva tu Espacio</h2>
                <label>Nombre Completo</label>
                <input type="text" id="cNombre" placeholder="Tu nombre" required>
                <label>Telefono</label>
                <input type="tel" id="cTel" placeholder="787-000-0000" required>
                <label>Fecha</label>
                <input type="date" id="cDate" onchange="verHorasCliente()">
                <label>Horario</label>
                <select id="cTime"><option value="">Seleccione fecha primero</option></select>
                <label>Servicio</label>
                <select id="cService">
                    <option>Limpieza Basica</option>
                    <option>Limpieza Profunda</option>
                    <option>Limpieza Post Remodelacion</option>
                    <option>Limpieza de Oficinas</option>
                    <option>Limpieza Comercial</option>
                    <option>Limpieza de Airbnb's</option>
                    <option>Servicios de Organizacion</option>
                    <option>Limpieza para Mudanzas</option>
                </select>
                <button class="btn btn-reserve" onclick="guardarReservaCliente()">RESERVA YA</button>
            </div>
        </section>

        <!-- LOGIN -->
        <section id="loginForm" class="card">
            <h2>Acceso Admin</h2>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contrasena">
            <button class="btn btn-reserve" onclick="accederAdmin()">Entrar</button>
            <button class="btn btn-home" onclick="location.reload()">Regresar al Inicio</button>
        </section>

        <!-- PANEL ADMIN -->
        <section id="adminPanel">
            <div class="card">
                <h2>Citas Recibidas</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>Nombre</th><th>Telefono</th><th>Fecha/Hora</th><th>Servicio</th></tr>
                        </thead>
                        <tbody id="listaCitas"></tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <h2>Disponibilidad</h2>
                <input type="date" id="adminDate" onchange="verHorasAdmin()">
                <div class="time-grid" id="gridAdmin" style="display:none;">
                    <div class="time-item">9:00 AM <span id="h-9" class="status-toggle on" onclick="cambiarEstado('9')">DISPONIBLE</span></div>
                    <div class="time-item">10:00 AM <span id="h-10" class="status-toggle on" onclick="cambiarEstado('10')">DISPONIBLE</span></div>
                    <div class="time-item">11:00 AM <span id="h-11" class="status-toggle on" onclick="cambiarEstado('11')">DISPONIBLE</span></div>
                    <div class="time-item">12:00 PM <span id="h-12" class="status-toggle on" onclick="cambiarEstado('12')">DISPONIBLE</span></div>
                </div>
            </div>
            <button class="btn" style="background:#666; color:white; margin-top:20px;" onclick="location.reload()">Cerrar Sesion</button>
        </section>
    </div>

    <footer>&copy; 2026 EcoSpark LLC | Made in PR</footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBCsC16XwRHOO76eS4-BqhA0Y-8IH83maA",
            authDomain: "ecosparkllc.firebaseapp.com",
            projectId: "ecosparkllc",
            storageBucket: "ecosparkllc.firebasestorage.app",
            messagingSenderId: "403323212209",
            appId: "1:403323212209:web:cf3a4adf96226a09d4ed90"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // NAVEGACION
        function mostrarLogin() {
            document.getElementById('clientView').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        function accederAdmin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "kamalishsantos" && p === "Kamalish22_") {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('navAdmin').style.display = 'none';
                verListaReservas();[cite: 1]
            } else { alert("Acceso denegado"); }
        }

        // CLIENTE
        function verHorasCliente() {
            const fecha = document.getElementById('cDate').value;
            if(!fecha) return;
            db.ref('bloqueos/' + fecha).on('value', snap => {[cite: 1]
                const datos = snap.val() || {};
                const select = document.getElementById('cTime');
                select.innerHTML = "";
                let count = 0;
                ["9", "10", "11", "12"].forEach(h => {
                    if(!datos[h]) {
                        const txt = h === "12" ? "12:00 PM" : h + ":00 AM";
                        select.options.add(new Option(txt, h));
                        count++;
                    }
                });
                if(count === 0) select.options.add(new Option("No hay horarios", ""));
            });
        }

        function guardarReservaCliente() {
            const n = document.getElementById('cNombre').value;[cite: 1]
            const t = document.getElementById('cTel').value;[cite: 1]
            const f = document.getElementById('cDate').value;[cite: 1]
            const h = document.getElementById('cTime').value;[cite: 1]
            const s = document.getElementById('cService').value;[cite: 1]

            if(!n || !t || !f || !h || h === "") { alert("Por favor llene todos los campos"); return; }

            db.ref('citasRecibidas').push({ nombre: n, tel: t, fecha: f, hora: h, servicio: s });[cite: 1]
            db.ref('bloqueos/' + f + '/' + h).set(true).then(() => {[cite: 1]
                alert("Reserva enviada exitosamente");
                location.reload();
            });
        }

        // ADMIN
        function verListaReservas() {[cite: 1]
            db.ref('citasRecibidas').on('value', snap => {[cite: 1]
                const cuerpo = document.getElementById('listaCitas');[cite: 1]
                cuerpo.innerHTML = "";[cite: 1]
                snap.forEach(hijo => {[cite: 1]
                    const d = hijo.val();[cite: 1]
                    cuerpo.innerHTML += `<tr><td>${d.nombre}</td><td>${d.tel}</td><td>${d.fecha} (${d.hora}:00)</td><td>${d.servicio}</td></tr>`;[cite: 1]
                });
            });
        }

        function verHorasAdmin() {
            const fecha = document.getElementById('adminDate').value;
            if(!fecha) return;
            document.getElementById('gridAdmin').style.display = 'grid';
            db.ref('bloqueos/' + fecha).on('value', snap => {[cite: 1]
                const datos = snap.val() || {};
                ["9", "10", "11", "12"].forEach(h => {
                    const btn = document.getElementById('h-' + h);
                    const estaB = datos[h];
                    btn.innerText = estaB ? "BLOQUEADO" : "DISPONIBLE";
                    btn.className = estaB ? "status-toggle off" : "status-toggle on";
                });
            });
        }

        function cambiarEstado(h) {
            const f = document.getElementById('adminDate').value;
            if(!f) return;
            const ref = db.ref('bloqueos/' + f + '/' + h);[cite: 1]
            ref.once('value', snap => {[cite: 1]
                if(snap.exists()) ref.remove(); else ref.set(true);[cite: 1]
            });
        }
    </script>
</body>
</html>
