<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSpark LLC - Sistema de Reservas</title>
    
    <!-- Tipografía Moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Enlace al archivo CSS Externo -->
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body>

    <div class="container" style="text-align: right; padding-top: 10px;">
        <button class="btn-admin" id="btnAdminNav" onclick="abrirLogin()">Admin</button>
    </div>

    <header>
        <h1>ECOSPARK LLC</h1>
        <p>Servicios de Limpieza Profesional | San Juan, PR</p>
    </header>

    <div class="container">
        <!-- VISTA CLIENTE -->
        <section id="clientSection">
            <div class="card">
                <h2>Reserva tu Cita</h2>
                <label>Nombre Completo</label>
                <input type="text" id="cNombre" placeholder="Nombre y Apellido">
                
                <label>Teléfono</label>
                <input type="tel" id="cTel" placeholder="787-000-0000">
                
                <label>Fecha</label>
                <input type="date" id="cFecha" onchange="cargarHorasCliente()">
                
                <label>Horarios Disponibles</label>
                <select id="cHora">
                    <option value="">Seleccione una fecha primero...</option>
                </select>
                
                <label>Servicios</label>
                <select id="cServicio">
                    <option>Limpieza Basica</option>
                    <option>Limpieza Profunda</option>
                    <option>Limpieza Post Remodelacion</option>
                    <option>Limpieza de Oficinas</option>
                    <option>Limpieza Comercial</option>
                    <option>Limpieza de Airbnb's</option>
                    <option>Servicios de Organizacion</option>
                    <option>Limpieza para Mudanzas</option>
                </select>
                
                <button class="btn btn-reserve" onclick="confirmarCita()">RESERVA YA</button>
            </div>
        </section>

        <!-- LOGIN (Oculto por CSS) -->
        <section id="loginSection" class="card">
            <h2>Acceso Administrativo</h2>
            <input type="text" id="uAdmin" placeholder="Usuario">
            <input type="password" id="pAdmin" placeholder="Contraseña">
            <button class="btn btn-reserve" onclick="loginAdmin()">Entrar al Panel</button>
            <button class="btn" style="background:#ccc; color: #333;" onclick="location.reload()">Regresar</button>
        </section>

        <!-- PANEL ADMIN (Oculto por CSS) -->
        <section id="adminSection">
            <div class="card" style="max-width: 100%; margin-top: 20px;">
                <h2>Citas Recibidas</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Tel.</th>
                                <th>Fecha/Hora</th>
                                <th>Servicio</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCitasAdmin"></tbody>
                    </table>
                </div>
            </div>

            <div class="card" style="max-width: 100%;">
                <h2>Control de Disponibilidad</h2>
                <input type="date" id="fAdmin" onchange="cargarHorasAdmin()">
                <div class="grid-horas" id="adminGrid" style="display:none;">
                    <div class="hora-item">9:00 AM <span id="h-9" class="toggle disponible" onclick="cambiarEstado('9')">DISPONIBLE</span></div>
                    <div class="hora-item">10:00 AM <span id="h-10" class="toggle disponible" onclick="cambiarEstado('10')">DISPONIBLE</span></div>
                    <div class="hora-item">11:00 AM <span id="h-11" class="toggle disponible" onclick="cambiarEstado('11')">DISPONIBLE</span></div>
                    <div class="hora-item">12:00 PM <span id="h-12" class="toggle disponible" onclick="cambiarEstado('12')">DISPONIBLE</span></div>
                </div>
            </div>
            
            <div style="text-align: center; margin-bottom: 40px;">
                <button class="btn" style="background:#666; color:white; width: auto; padding: 15px 40px;" onclick="location.reload()">Cerrar Sesión</button>
            </div>
        </section>
    </div>

    <footer>&copy; 2026 EcoSpark LLC | Made in PR</footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBCsC16XwRHOO76eS4-BqhA0Y-8IH83maA",
            authDomain: "ecosparkllc.firebaseapp.com",
            projectId: "ecosparkllc",
            storageBucket: "ecosparkllc.firebasestorage.app",
            messagingSenderId: "403323212209",
            appId: "1:403323212209:web:cf3a4adf96226a09d4ed90"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // NAVEGACIÓN ACTUALIZADA CON CLASES
        function abrirLogin() {
            document.getElementById('clientSection').style.display = 'none';
            // Activamos la clase visible definida en style.css
            document.getElementById('loginSection').classList.add('visible');
            document.getElementById('btnAdminNav').style.display = 'none';
        }

        function loginAdmin() {
            const u = document.getElementById('uAdmin').value;
            const p = document.getElementById('pAdmin').value;
            if(u === "kamalishsantos" && p === "Kamalish22_") {
                document.getElementById('loginSection').classList.remove('visible');
                // Activamos el panel administrativo con la clase visible
                document.getElementById('adminSection').classList.add('visible');
                escucharNuevasCitas();
            } else { alert("Acceso Incorrecto"); }
        }

        function cargarHorasCliente() {
            const f = document.getElementById('cFecha').value;
            if(!f) return;
            db.ref('bloqueos/' + f).on('value', snap => {
                const b = snap.val() || {};
                const s = document.getElementById('cHora');
                s.innerHTML = "";
                let count = 0;
                ["9", "10", "11", "12"].forEach(h => {
                    if(!b[h]) {
                        const t = h === "12" ? "12:00 PM" : h + ":00 AM";
                        s.options.add(new Option(t, h));
                        count++;
                    }
                });
                if(count === 0) s.options.add(new Option("Sin disponibilidad hoy", ""));
            });
        }

        function confirmarCita() {
            const n = document.getElementById('cNombre').value;
            const t = document.getElementById('cTel').value;
            const f = document.getElementById('cFecha').value;
            const h = document.getElementById('cHora').value;
            const s = document.getElementById('cServicio').value;

            if(!n || !t || !f || !h || h === "") { alert("Por favor complete todos los datos"); return; }

            db.ref('listadoReservas').push({ nombre: n, tel: t, fecha: f, hora: h, servicio: s });
            db.ref('bloqueos/' + f + '/' + h).set(true).then(() => {
                alert("¡Cita reservada con éxito!");
                location.reload();
            });
        }

        function escucharNuevasCitas() {
            db.ref('listadoReservas').on('value', snap => {
                const tabla = document.getElementById('tablaCitasAdmin');
                tabla.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    tabla.innerHTML += `<tr><td>${d.nombre}</td><td>${d.tel}</td><td>${d.fecha} (${d.hora}:00)</td><td>${d.servicio}</td></tr>`;
                });
            });
        }

        function cargarHorasAdmin() {
            const f = document.getElementById('fAdmin').value;
            if(!f) return;
            document.getElementById('adminGrid').style.display = 'grid';
            db.ref('bloqueos/' + f).on('value', snap => {
                const b = snap.val() || {};
                ["9", "10", "11", "12"].forEach(h => {
                    const el = document.getElementById('h-' + h);
                    const estaB = b[h];
                    el.innerText = estaB ? "BLOQUEADO" : "DISPONIBLE";
                    el.className = estaB ? "toggle bloqueado" : "toggle disponible";
                });
            });
        }

        function cambiarEstado(h) {
            const f = document.getElementById('fAdmin').value;
            if(!f) return;
            const ref = db.ref('bloqueos/' + f + '/' + h);
            ref.once('value', snap => {
                if(snap.exists()) ref.remove(); else ref.set(true);
            });
        }
    </script>
</body>
</html>
